<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows IT Command Bible — IT Practice Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F2;--surface:#fff;--surface2:#F0EEE8;--surface3:#E8E4DC;
  --border:#E2DDD4;--text:#1A1816;--muted:#7A7168;
  --green:#2E7D52;--green-light:#E8F5EE;
  --blue:#1B5FA8;--yellow:#8A6800;--orange:#B85C2A;--red:#C0392B;
  --radius:10px;--mono:'JetBrains Mono',monospace;--shadow:0 2px 12px rgba(0,0,0,0.07);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}
.logo-name{font-family:'Sora',sans-serif;font-size:14px;font-weight:700}
.logo-sep{color:var(--border);margin:0 4px}
.logo-page{font-size:14px;color:var(--muted)}
.back-btn{padding:7px 14px;border:1px solid var(--border);background:transparent;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--muted);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.back-btn:hover{background:var(--surface2);color:var(--text)}

.layout{display:flex;flex:1;height:calc(100vh - 65px)}

/* SIDEBAR */
.sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);padding:20px 12px;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;gap:2px}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);padding:0 8px;margin-bottom:8px;margin-top:8px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border-radius:7px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;text-align:left;transition:all .15s}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--surface2);color:var(--text);font-weight:600}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-count{margin-left:auto;font-size:11px;background:var(--surface3);padding:2px 7px;border-radius:20px;color:var(--muted)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:28px 32px}

/* SEARCH BAR */
.search-wrap{display:flex;gap:10px;margin-bottom:24px;align-items:center}
.search-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 16px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;box-shadow:var(--shadow)}
.search-box::placeholder{color:var(--muted)}
.search-box:focus{border-color:var(--text)}
.search-box::-webkit-search-cancel-button{display:none}
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);cursor:pointer;outline:none;box-shadow:var(--shadow)}

/* HERO */
.hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:30px;margin-bottom:24px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.hero::after{content:'>';position:absolute;right:24px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:100px;opacity:.04;color:var(--text)}
.hero-title{font-family:'Sora',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.8px;margin-bottom:8px}
.hero-sub{font-size:13.5px;color:var(--muted);line-height:1.6;max-width:500px}
.hero-stats{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.h-stat{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 14px;font-size:12px}
.h-stat b{font-family:'Sora',sans-serif;font-size:16px;display:block}

/* QUICK REF */
.quickref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:28px}
.qr-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.qr-head{padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;background:var(--surface2);border-bottom:1px solid var(--border);color:var(--muted)}
.qr-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border)}
.qr-row:last-child{border-bottom:none}
.qr-task{font-size:12.5px;color:var(--muted);flex-shrink:0}
.qr-cmd{font-family:var(--mono);font-size:11.5px;color:var(--green);text-align:right;word-break:break-all;cursor:pointer;transition:color .15s}
.qr-cmd:hover{color:var(--text)}

/* SECTION */
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-title{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.4px}
.section-count{font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px}

/* CATEGORY PILLS */
.cat-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cat-pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);transition:all .15s;background:var(--surface2);color:var(--muted)}
.cat-pill:hover{color:var(--text);border-color:var(--muted)}
.cat-pill.active{color:#fff;border-color:transparent}

/* TABLE */
.cmd-table{width:100%;border-collapse:collapse;margin-bottom:28px;font-size:13px;box-shadow:var(--shadow);border-radius:var(--radius);overflow:hidden}
.cmd-table thead tr{background:var(--surface2)}
.cmd-table th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
.cmd-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5;background:var(--surface)}
.cmd-table tr:last-child td{border-bottom:none}
.cmd-table tr:hover td{background:var(--surface2)}
.cmd-cell{font-family:var(--mono);font-size:12px;color:var(--green);cursor:pointer;display:flex;align-items:center;gap:6px;position:relative}
.cmd-cell:hover{color:var(--text)}
.copy-hint{font-size:10px;color:var(--muted);opacity:0;transition:opacity .15s;position:absolute;right:0;top:50%;transform:translateY(-50%);background:var(--surface3);padding:2px 6px;border-radius:4px;white-space:nowrap;pointer-events:none;border:1px solid var(--border)}
.cmd-cell:hover .copy-hint{opacity:1}
.diff-badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--muted);white-space:nowrap;border:1px solid var(--border)}
.use-badge{padding:2px 8px;border-radius:5px;font-size:11px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.tips-cell{color:var(--muted);font-size:12px;font-style:italic}

/* COPY TOAST */
#copyToast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;transform:translateY(60px);opacity:0;transition:all .25s;z-index:999;pointer-events:none}
#copyToast.show{transform:translateY(0);opacity:1}

/* NO RESULTS */
.no-results{text-align:center;padding:48px 24px;color:var(--muted)}
.no-results div{font-size:32px;margin-bottom:10px}

@media(max-width:700px){.sidebar{display:none}.main{padding:20px 16px}header{padding:14px 18px}}

[data-theme="dark"] {
  --bg:#0D1117;--surface:#161B22;--surface2:#21262D;--surface3:#2D333B;
  --border:#30363D;--text:#E6EDF3;--muted:#7D8590;
  --shadow:0 4px 20px rgba(0,0,0,0.4);
}

[data-theme="dark"] {
  --green:#3FB950;--blue:#79C0FF;--yellow:#E3B341;--orange:#FFA657;--red:#F85149;
}

.theme-toggle{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.theme-toggle:hover{background:var(--border);}

</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">&gt;_</div>
    <div style="display:flex;align-items:center;gap:4px">
      <span class="logo-name">IT Practice Hub</span>

  </div>

</header>

: "\ud83d\udce1 NETWORK TROUBLESHOOTING", "task": "Trace route", "command": "tracert 8.8.8.8"}, {"section": "\ud83d\udce1 NETWORK TROUBLESHOOTING", "task": "Check DNS resolution", "command": "nslookup google.com"}, {"section": "\ud83d\udce1 NETWORK TROUBLESHOOTING", "task": "Flush DNS cache", "command": "ipconfig /flushdns"}, {"section": "\ud83d\udce1 NETWORK TROUBLESHOOTING", "task": "Reset TCP/IP stack", "command": "netsh int ip reset && netsh winsock reset"}, {"section": "\ud83d\udce1 NETWORK TROUBLESHOOTING", "task": "Check open ports", "command": "netstat -ano | findstr LISTENING"}, {"section": "\u26a1 SYSTEM PERFORMANCE ISSUES", "task": "Top CPU processes", "command": "Get-Process | Sort CPU -Desc | Select -First 10 Name,CPU,WS"}, {"section": "\u26a1 SYSTEM PERFORMANCE ISSUES", "task": "Check disk health", "command": "chkdsk C: /f"}, {"section": "\u26a1 SYSTEM PERFORMANCE ISSUES", "task": "Repair system files", "command": "sfc /scannow"}, {"section": "\u26a1 SYSTEM PERFORMANCE ISSUES", "task": "Repair image", "command": "DISM /Online /Cleanup-Image /RestoreHealth"}, {"section": "\u26a1 SYSTEM PERFORMANCE ISSUES", "task": "List running services", "command": "Get-Service | Where Status -eq Running"}, {"section": "\ud83d\udd10 SECURITY INCIDENT RESPONSE", "task": "Check open connections", "command": "netstat -ano"}, {"section": "\ud83d\udd10 SECURITY INCIDENT RESPONSE", "task": "Check Defender status", "command": "Get-MpComputerStatus"}, {"section": "\ud83d\udd10 SECURITY INCIDENT RESPONSE", "task": "Scan for threats", "command": "Start-MpScan -ScanType FullScan"}, {"section": "\ud83d\udd10 SECURITY INCIDENT RESPONSE", "task": "Review security logs", "command": "Get-EventLog -LogName Security -Newest 50 -EntryType FailureAudit"}, {"section": "\ud83d\udd10 SECURITY INCIDENT RESPONSE", "task": "Check BitLocker", "command": "manage-bde -status"}, {"section": "\ud83d\udd10 SECURITY INCIDENT RESPONSE", "task": "List local admins", "command": "net localgroup Administrators"}, {"section": "\ud83d\udee0\ufe0f REMOTE TROUBLESHOOTING", "task": "Test remote port", "command": "Test-NetConnection -ComputerName PC01 -Port 3389"}, {"section": "\ud83d\udee0\ufe0f REMOTE TROUBLESHOOTING", "task": "Remote restart", "command": "Restart-Computer -ComputerName PC01 -Force"}, {"section": "\ud83d\udee0\ufe0f REMOTE TROUBLESHOOTING", "task": "Remote PS session", "command": "Enter-PSSession -ComputerName PC01"}, {"section": "\ud83d\udee0\ufe0f REMOTE TROUBLESHOOTING", "task": "Remote GPO update", "command": "Invoke-GPUpdate -Computer PC01 -RandomDelayInMinutes 0"}, {"section": "\ud83d\udcca QUICK SYSTEM INFO", "task": "OS and hardware info", "command": "systeminfo | findstr /B /C:\"OS\" /C:\"Total Physical\""}, {"section": "\ud83d\udcca QUICK SYSTEM INFO", "task": "IP and MAC", "command": "ipconfig /all | findstr /C:\"IPv4\" /C:\"Physical\""}, {"section": "\ud83d\udcca QUICK SYSTEM INFO", "task": "Hostname and user", "command": "echo Hostname: %COMPUTERNAME% && whoami"}, {"section": "\ud83d\udcca QUICK SYSTEM INFO", "task": "Disk space", "command": "wmic logicaldisk get Name,FreeSpace,Size"}, {"section": "\ud83d\udcca QUICK SYSTEM INFO", "task": "Uptime (PS)", "command": "Get-ComputerInfo | Select OsLastBootUpTime"}]};

const MODULE_ORDER = ['shortcuts','cmd','ps','networking','ad','security'];
const COLORS = {shortcuts:'#E3B341',cmd:'#79C0FF',ps:'#BC8CFF',networking:'#3FB950',ad:'#FFA657',security:'#F85149'};

let activeTab = 'quickref';
let activeCat = 'all';
let searchQuery = '';
let diffFilter = 'all';

function escape(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function copyCmd(cmd){
  navigator.clipboard.writeText(cmd).catch(()=>{});
  const t = document.getElementById('copyToast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function renderSidebar(){
  const s = document.getElementById('sidebar');
  let h = '<div class="sidebar-label">Reference</div>';
  h += `<button class="nav-btn ${activeTab==='quickref'?'active':''}" onclick="setTab('quickref')"><span class="nav-dot" style="background:#E3B341"></span>Quick Reference</button>`;
  h += '<div class="sidebar-label">Command Sets</div>';
  MODULE_ORDER.forEach(k => {
    const m = DATA[k];
    h += `<button class="nav-btn ${activeTab===k?'active':''}" onclick="setTab('${k}')">
      <span class="nav-dot" style="background:${COLORS[k]}"></span>${m.label}
      <span class="nav-count">${m.rows.length}</span>
    </button>`;
  });
  s.innerHTML = h;
}

function renderMain(){
  const m = document.getElementById('main');
  if(activeTab === 'quickref') { m.innerHTML = renderQuickRef(); return; }
  
  const mod = DATA[activeTab];
  const color = COLORS[activeTab];
  
  // get categories
  const cats = ['all', ...new Set(mod.rows.map(r=>r.category))];
  
  // filter
  let rows = mod.rows;
  if(activeCat !== 'all') rows = rows.filter(r=>r.category===activeCat);
  if(searchQuery) {
    const q = searchQuery.toLowerCase();
    rows = rows.filter(r => r.command.toLowerCase().includes(q) || r.description.toLowerCase().includes(q) || r.tips.toLowerCase().includes(q));
  }
  if(diffFilter !== 'all') rows = rows.filter(r=>r.difficulty===diffFilter);
  
  let h = `<div class="hero">
    <div class="hero-title">${mod.icon} ${mod.label}</div>
    <div class="hero-sub">All ${mod.label} commands from the BL Windows IT Command Bible. Click any command to copy it to your clipboard.</div>
    <div class="hero-stats">
      <div class="h-stat"><b style="color:${color}">${mod.rows.length}</b>Commands</div>
      <div class="h-stat"><b style="color:${color}">${cats.length-1}</b>Categories</div>
    </div>
  </div>`;
  
  h += `<div class="search-wrap">
    <input class="search-box" type="search" placeholder="Search commands, descriptions, tips..." value="${escape(searchQuery)}" oninput="onSearch(this.value)">
    <select class="filter-select" onchange="onDiff(this.value)">
      <option value="all" ${diffFilter==='all'?'selected':''}>All Levels</option>
      <option value="★☆☆" ${diffFilter==='★☆☆'?'selected':''}>★☆☆ Beginner</option>
      <option value="★★☆" ${diffFilter==='★★☆'?'selected':''}>★★☆ Intermediate</option>
      <option value="★★★" ${diffFilter==='★★★'?'selected':''}>★★★ Advanced</option>
    </select>
  </div>`;
  
  h += '<div class="cat-pills">';
  cats.forEach(c => {
    const isActive = activeCat===c;
    h += `<span class="cat-pill ${isActive?'active':''}" style="${isActive?`background:${color};border-color:${color}`:`border-color:${color}33`}" onclick="setCat('${c.replace(/'/g,"\'")}')">
      ${c==='all'?'All Categories':c}
    </span>`;
  });
  h += '</div>';
  
  if(!rows.length){
    h += '<div class="no-results"><div>🔍</div>No commands match your search.</div>';
  } else {
    h += `<div class="section-head">
      <span class="section-title">Commands</span>
      <span class="section-count">${rows.length} shown</span>
    </div>`;
    h += '<table class="cmd-table"><thead><tr><th>Command</th><th>Description</th><th>Level</th><th>Use Case</th><th>Tips</th></tr></thead><tbody>';
    rows.forEach(r => {
      h += `<tr>
        <td><div class="cmd-cell" onclick="copyCmd('${escape(r.command)}')"><span>${escape(r.command)}</span><span class="copy-hint">click to copy</span></div></td>
        <td>${escape(r.description)}</td>
        <td><span class="diff-badge">${escape(r.difficulty)}</span></td>
        <td><span class="use-badge">${escape(r.use_case)}</span></td>
        <td class="tips-cell">${escape(r.tips)||'—'}</td>
      </tr>`;
    });
    h += '</tbody></table>';
  }
  m.innerHTML = h;
}

function renderQuickRef(){
  const qr = DATA.quickref;
  const sections = {};
  qr.forEach(item => {
    if(!sections[item.section]) sections[item.section]=[];
    sections[item.section].push(item);
  });
  
  let h = `<div class="hero">
    <div class="hero-title">📋 Quick Reference</div>
    <div class="hero-sub">Top commands for the most common IT support scenarios — right when you need them. Click any command to copy.</div>
    <div class="hero-stats">
      <div class="h-stat"><b style="color:#E3B341">${qr.length}</b>Commands</div>
      <div class="h-stat"><b style="color:#E3B341">${Object.keys(sections).length}</b>Scenarios</div>
    </div>
  </div>`;
  
  h += '<div class="quickref-grid">';
  Object.entries(sections).forEach(([sec, items]) => {
    h += `<div class="qr-card">
      <div class="qr-head">${escape(sec)}</div>`;
    items.forEach(item => {
      h += `<div class="qr-row">
        <span class="qr-task">${escape(item.task)}</span>
        <span class="qr-cmd" onclick="copyCmd('${escape(item.command)}')" title="${escape(item.command)}">${escape(item.command.length>40?item.command.slice(0,38)+'…':item.command)}</span>
      </div>`;
    });
    h += '</div>';
  });
  h += '</div>';
  return h;
}

function setTab(t){ activeTab=t; activeCat='all'; searchQuery=''; diffFilter='all'; renderSidebar(); renderMain(); }
function setCat(c){ activeCat=c; renderMain(); }
function onSearch(v){ searchQuery=v; renderMain(); }
function onDiff(v){ diffFilter=v; renderMain(); }

renderSidebar();
renderMain();
</script>

<script>
(function(){
  const t = localStorage.getItem('hub-theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('themeToggle');
  if(btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
})();
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('hub-theme', next);
  const btn = document.getElementById('themeToggle');
  if(btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
}
</script>
