<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Troubleshooting Tree</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F0EEE8;
    --border: #E2DDD4;
    --text: #1A1816;
    --text-muted: #7A7168;
    --accent-net: #1B6CA8;
    --accent-hw: #B85C2A;
    --accent-os: #2E7D52;
    --accent-acc: #7B3FA0;
    --accent-sec: #C0392B;
    --accent-active: #1A1816;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--text);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 18px;
    letter-spacing: -1px;
  }
  .logo-text {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-ghost {
    padding: 7px 14px;
    border: 1px solid var(--border);
    background: transparent;
    border-radius: 7px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  /* LAYOUT */
  .app-body {
    display: flex;
    flex: 1;
    height: calc(100vh - 65px);
  }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding: 0 8px;
  }
  .cat-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    margin-bottom: 2px;
  }
  .cat-btn:hover { background: var(--surface2); }
  .cat-btn.active { background: var(--text); color: #fff; }
  .cat-btn.active .cat-dot { background: #fff !important; }
  .cat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* DIVIDER */
  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 14px 8px;
  }

  /* MAIN */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }

  /* BREADCRUMB */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
    font-size: 12.5px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .breadcrumb span { cursor: pointer; }
  .breadcrumb span:hover { color: var(--text); text-decoration: underline; }
  .breadcrumb .sep { opacity: 0.4; }
  .breadcrumb .current { color: var(--text); font-weight: 500; }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .step-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 14px;
    color: #fff;
  }
  .question-title {
    font-family: 'Sora', sans-serif;
    font-size: 22px;
    line-height: 1.35;
    margin-bottom: 6px;
    color: var(--text);
  }
  .question-hint {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 22px;
    line-height: 1.5;
  }

  /* OPTIONS */
  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.18s;
    line-height: 1.4;
  }
  .option-btn:hover {
    border-color: var(--accent-active);
    background: #fff;
    transform: translateX(3px);
    box-shadow: var(--shadow);
  }
  .option-letter {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    transition: all 0.18s;
  }
  .option-btn:hover .option-letter {
    background: var(--text);
    color: #fff;
  }

  /* RESOLUTION CARD */
  .resolution-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    box-shadow: var(--shadow);
    animation: fadeUp 0.25s ease;
  }
  .resolution-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .res-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .res-icon.success { background: #E8F5EE; }
  .res-icon.warning { background: #FEF3E2; }
  .resolution-title {
    font-family: 'Sora', sans-serif;
    font-size: 20px;
    line-height: 1.3;
  }
  .resolution-body {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .steps-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .steps-list li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 13.5px;
    line-height: 1.5;
    padding: 11px 14px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--text);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .command-box {
    background: #1A1816;
    color: #7CFC8A;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 14px 18px;
    border-radius: 8px;
    margin: 12px 0 20px;
    line-height: 1.7;
    overflow-x: auto;
  }
  .cmd-comment { color: #666; }
  .cmd-prompt { color: #aaa; }

  .res-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-primary {
    padding: 10px 20px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-outline {
    padding: 10px 20px;
    background: transparent;
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-outline:hover { background: var(--surface2); border-color: var(--text); }

  /* PATH HISTORY */
  .path-history {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    font-size: 13px;
  }
  .path-history-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .path-steps {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .path-tag {
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .path-tag.answer {
    color: var(--text);
    font-weight: 500;
    background: #fff;
  }

  /* HOME SCREEN */
  .home-screen {
    animation: fadeUp 0.3s ease;
  }
  .home-intro {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .home-title {
    font-family: 'Sora', sans-serif;
    font-size: 30px;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .home-sub {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 520px;
  }

  .cats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }
  .cat-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 20px;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: var(--shadow);
  }
  .cat-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
    border-color: var(--card-accent);
  }
  .cat-card-icon {
    font-size: 26px;
    margin-bottom: 12px;
  }
  .cat-card-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .cat-card-count {
    font-size: 12px;
    color: var(--text-muted);
  }
  .cat-card-bar {
    height: 3px;
    border-radius: 2px;
    margin-top: 14px;
    opacity: 0.5;
  }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .main { padding: 20px 18px; }
    header { padding: 14px 18px; }
  }

[data-theme="dark"] {
  --bg:#0D1117;--surface:#161B22;--surface2:#21262D;--surface3:#2D333B;
  --border:#30363D;--text:#E6EDF3;--muted:#7D8590;
  --shadow:0 4px 20px rgba(0,0,0,0.4);
}

[data-theme="dark"] { --text-muted:#7D8590; }

.theme-toggle{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.theme-toggle:hover{background:var(--border);}

</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">IT</div>
    <div>
      <div class="logo-text">TroubleTree</div>
      <div class="logo-sub">IT Support Troubleshooting Guide</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-ghost" id="homeBtn">⌂ Home</button>
    <button class="btn-ghost" id="resetBtn">↺ Reset</button>
  </div>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div class="sidebar-label">Categories</div>
    <button class="cat-btn" data-cat="networking" onclick="startCategory('networking')">
      <span class="cat-dot" style="background:#1B6CA8"></span> Networking
    </button>
    <button class="cat-btn" data-cat="hardware" onclick="startCategory('hardware')">
      <span class="cat-dot" style="background:#B85C2A"></span> Hardware
    </button>
    <button class="cat-btn" data-cat="os" onclick="startCategory('os')">
      <span class="cat-dot" style="background:#2E7D52"></span> OS & Software
    </button>
    <button class="cat-btn" data-cat="accounts" onclick="startCategory('accounts')">
      <span class="cat-dot" style="background:#7B3FA0"></span> Accounts & Access
    </button>
    <button class="cat-btn" data-cat="security" onclick="startCategory('security')">
      <span class="cat-dot" style="background:#C0392B"></span> Security
    </button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Session</div>
    <div style="padding:0 8px;font-size:12.5px;color:var(--text-muted);line-height:1.6;">
      <div id="session-stat">No active session</div>
    </div>
  </aside>

  <main class="main" id="mainContent">
    <!-- rendered by JS -->
  </main>
</div>

<script>
// ===================== DATA =====================
const categories = {
  networking: {
    name: "Networking & Connectivity",
    icon: "🌐",
    color: "#1B6CA8",
    bg: "#E8F2FA",
    trees: [
      {
        id: "no-internet",
        title: "No Internet Access",
        hint: "User reports they cannot browse the web or access online services.",
        question: "Can the user ping the default gateway (e.g., 192.168.1.1)?",
        options: [
          {
            label: "Yes — gateway is reachable",
            next: {
              question: "Can the user ping an external IP like 8.8.8.8?",
              hint: "This tests if the issue is DNS or upstream.",
              options: [
                {
                  label: "Yes — external IP reachable",
                  next: {
                    question: "Can the user ping a domain name like google.com?",
                    options: [
                      { label: "No — domain not resolving", resolve: "dns_issue" },
                      { label: "Yes — resolves fine", resolve: "browser_issue" }
                    ]
                  }
                },
                { label: "No — external IP not reachable", resolve: "isp_or_router" }
              ]
            }
          },
          {
            label: "No — gateway unreachable",
            next: {
              question: "Is the network adapter showing as connected?",
              options: [
                { label: "No — adapter shows disconnected", resolve: "adapter_disconnect" },
                { label: "Yes — adapter says connected", resolve: "ip_config_issue" }
              ]
            }
          }
        ]
      },
      {
        id: "slow-network",
        title: "Slow Network Speed",
        hint: "User reports unusually slow internet or network file transfers.",
        question: "Is the slowness affecting all devices on the network or just one?",
        options: [
          {
            label: "All devices affected",
            next: {
              question: "Is this a wired or wireless connection issue?",
              options: [
                { label: "Wired and wireless both slow", resolve: "isp_bandwidth" },
                { label: "Wireless only", resolve: "wifi_congestion" }
              ]
            }
          },
          {
            label: "Only one device",
            next: {
              question: "Has the device recently had updates or new software installed?",
              options: [
                { label: "Yes — after recent changes", resolve: "background_traffic" },
                { label: "No — nothing changed", resolve: "nic_driver" }
              ]
            }
          }
        ]
      }
    ]
  },
  hardware: {
    name: "Hardware & Peripherals",
    icon: "🖥️",
    color: "#B85C2A",
    bg: "#FAF0EA",
    trees: [
      {
        id: "monitor-no-display",
        title: "Monitor Has No Display",
        hint: "Screen is black or showing no signal.",
        question: "Is the monitor power LED on?",
        options: [
          {
            label: "No — LED is off",
            next: {
              question: "Is the power cable securely connected to both monitor and outlet?",
              options: [
                { label: "No — cable was loose", resolve: "monitor_power_cable" },
                { label: "Yes — cable is secure", resolve: "monitor_dead" }
              ]
            }
          },
          {
            label: "Yes — LED is on but no image",
            next: {
              question: "Does the monitor show 'No Signal' message?",
              options: [
                {
                  label: "Yes — shows No Signal",
                  next: {
                    question: "Is the correct video input source selected on the monitor?",
                    options: [
                      { label: "No — wrong input selected", resolve: "wrong_input" },
                      { label: "Yes — correct input", resolve: "gpu_or_cable" }
                    ]
                  }
                },
                { label: "No — completely black", resolve: "monitor_panel" }
              ]
            }
          }
        ]
      },
      {
        id: "printer-not-printing",
        title: "Printer Not Printing",
        hint: "Print jobs are sent but nothing comes out.",
        question: "Does the printer show any error lights or messages?",
        options: [
          {
            label: "Yes — error indicated",
            next: {
              question: "What type of error is shown?",
              options: [
                { label: "Paper jam", resolve: "paper_jam" },
                { label: "Low ink / toner", resolve: "low_ink" },
                { label: "Other error code", resolve: "printer_error_code" }
              ]
            }
          },
          {
            label: "No — printer looks normal",
            next: {
              question: "Is the print queue showing the job as pending or stuck?",
              options: [
                { label: "Yes — job stuck in queue", resolve: "clear_print_queue" },
                { label: "No — queue appears empty", resolve: "printer_driver" }
              ]
            }
          }
        ]
      }
    ]
  },
  os: {
    name: "OS & Software",
    icon: "💻",
    color: "#2E7D52",
    bg: "#E8F5EE",
    trees: [
      {
        id: "slow-pc",
        title: "PC Running Slowly",
        hint: "User reports the computer is sluggish or unresponsive.",
        question: "Is the slowness happening immediately after startup or only after extended use?",
        options: [
          {
            label: "Right from startup",
            next: {
              question: "Are there many programs in the startup list?",
              options: [
                { label: "Yes — lots of startup items", resolve: "startup_items" },
                { label: "No — startup is clean", resolve: "low_ram_or_drive" }
              ]
            }
          },
          {
            label: "After extended use",
            next: {
              question: "Does Task Manager show high CPU or RAM usage?",
              options: [
                { label: "Yes — high CPU", resolve: "cpu_hog_process" },
                { label: "Yes — high RAM", resolve: "memory_leak" },
                { label: "No — resources look normal", resolve: "disk_health" }
              ]
            }
          }
        ]
      },
      {
        id: "app-crash",
        title: "Application Keeps Crashing",
        hint: "A specific application closes unexpectedly.",
        question: "Does the crash happen immediately on launch or after some time?",
        options: [
          {
            label: "Immediately on launch",
            next: {
              question: "Was the app recently installed or updated?",
              options: [
                { label: "Yes — just installed/updated", resolve: "corrupt_install" },
                { label: "No — was working before", resolve: "missing_dependency" }
              ]
            }
          },
          {
            label: "After some time of use",
            next: {
              question: "Does the crash correlate with a specific action?",
              options: [
                { label: "Yes — same action triggers it", resolve: "app_bug_workaround" },
                { label: "No — random timing", resolve: "ram_or_driver" }
              ]
            }
          }
        ]
      }
    ]
  },
  accounts: {
    name: "Accounts & Access",
    icon: "🔑",
    color: "#7B3FA0",
    bg: "#F3EBF9",
    trees: [
      {
        id: "cant-login",
        title: "User Can't Log In",
        hint: "User is unable to authenticate to their account.",
        question: "What error message is the user receiving?",
        options: [
          {
            label: "Incorrect username or password",
            next: {
              question: "Has the user recently changed their password?",
              options: [
                { label: "Yes — just changed it", resolve: "password_sync" },
                {
                  label: "No — same password as always",
                  next: {
                    question: "Is Caps Lock on?",
                    options: [
                      { label: "Yes!", resolve: "caps_lock" },
                      { label: "No — not Caps Lock", resolve: "password_reset" }
                    ]
                  }
                }
              ]
            }
          },
          { label: "Account locked out", resolve: "account_lockout" },
          { label: "Account disabled / expired", resolve: "account_disabled" },
          { label: "MFA / 2FA not working", resolve: "mfa_issue" }
        ]
      },
      {
        id: "no-permission",
        title: "Access Denied to Resource",
        hint: "User can log in but can't access a file, folder, or system.",
        question: "What resource is the user trying to access?",
        options: [
          {
            label: "A shared network folder",
            next: {
              question: "Has the user ever had access before?",
              options: [
                { label: "Yes — had access previously", resolve: "permission_revoked" },
                { label: "No — new request", resolve: "permission_grant" }
              ]
            }
          },
          { label: "A specific application", resolve: "app_role_assignment" },
          { label: "A website or portal", resolve: "sso_or_vpn" }
        ]
      }
    ]
  },
  security: {
    name: "Security",
    icon: "🛡️",
    color: "#C0392B",
    bg: "#FAEBEA",

    steps: [
      "Determine if the file was opened or executed",
      "If executed: isolate the machine from the network immediately",
      "If not opened: delete the file and run a full AV scan",
      "Run Malwarebytes full scan regardless",
      "Escalate to security team and document the incident",
      "Review endpoint protection logs for any alerts triggered"
    ]
  },
  phish_monitoring: {
    title: "Link Clicked — Monitor and Educate",
    icon: "👀", type: "success",
    summary: "Just a click with no further action — lower risk but still worth monitoring.",
    steps: [
      "Advise user to monitor for any unusual account activity",
      "Have IT review proxy/firewall logs for the destination URL",
      "Block the malicious domain in your web filter if not already blocked",
      "Report the phishing email to your security team for blocklist updates",
      "Use this as a teachable moment — provide user security awareness guidance"
    ]
  }
};

// ===================== APP STATE =====================
let state = {
  screen: 'home', // home | tree | resolve
  category: null,
  treeIndex: 0,
  currentNode: null,
  breadcrumb: [],
  pathHistory: []
};

// ===================== RENDER =====================
function render() {
  const main = document.getElementById('mainContent');
  
  // Update sidebar active
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === state.category);
  });

  if (state.screen === 'home') {
    main.innerHTML = renderHome();
    updateSessionStat('No active session');
  } else if (state.screen === 'tree') {
    main.innerHTML = renderTree();
  } else if (state.screen === 'resolve') {
    main.innerHTML = renderResolution();
  }
}

function renderHome() {
  return `
    <div class="home-screen">
      <div class="home-intro">
        <div class="home-title">IT Troubleshooting Tree</div>
        <p class="home-sub">Work through common IT support scenarios step-by-step. Select a category to begin a guided diagnostic session — ideal for practicing your troubleshooting thought process.</p>
      </div>
      <div style="font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;">Choose a Category</div>
      <div class="cats-grid">
        ${Object.entries(categories).map(([key, cat]) => `
          <div class="cat-card" style="--card-accent:${cat.color}" onclick="startCategory('${key}')">
            <div class="cat-card-icon">${cat.icon}</div>
            <div class="cat-card-name">${cat.name}</div>
            <div class="cat-card-count">${cat.trees.length} scenario${cat.trees.length > 1 ? 's' : ''}</div>
            <div class="cat-card-bar" style="background:${cat.color}"></div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function renderTree() {
  const cat = categories[state.category];
  const tree = cat.trees[state.treeIndex];
  const node = state.currentNode;

  const bcHtml = `
    <div class="breadcrumb">
      <span onclick="goHome()">Home</span>
      <span class="sep">›</span>
      <span onclick="startCategory('${state.category}')">${cat.name}</span>
      <span class="sep">›</span>
      <span class="current">${tree.title}</span>
    </div>`;

  const pathHtml = state.pathHistory.length > 0 ? `
    <div class="path-history">
      <div class="path-history-title">Your path so far</div>
      <div class="path-steps">
        ${state.pathHistory.map(p => `
          <span class="path-tag">${p.q}</span>
          <span class="path-tag answer">→ ${p.a}</span>
        `).join('')}
      </div>
    </div>` : '';

  const letters = ['A','B','C','D','E'];

  return `
    ${bcHtml}
    ${pathHtml}
    <div class="question-card">
      <div class="step-badge" style="background:${cat.color}">${cat.icon} ${cat.name}</div>
      <div class="question-title">${node.question}</div>
      ${node.hint ? `<div class="question-hint">${node.hint}</div>` : ''}
      <div class="options-grid">
        ${node.options.map((opt, i) => `
          <button class="option-btn" onclick="selectOption(${i})">
            <span class="option-letter">${letters[i]}</span>
            <span>${opt.label}</span>
          </button>
        `).join('')}
      </div>
    </div>
    ${cat.trees.length > 1 ? `
      <div style="font-size:12.5px;color:var(--text-muted);padding:0 4px;">
        Scenario ${state.treeIndex + 1} of ${cat.trees.length} in ${cat.name}
      </div>` : ''}`;
}

function renderResolution() {
  const cat = categories[state.category];
  const tree = cat.trees[state.treeIndex];
  const res = resolutions[state.currentResolution];
  
  if (!res) return `<div>Resolution not found.</div>`;

  const bcHtml = `
    <div class="breadcrumb">
      <span onclick="goHome()">Home</span>
      <span class="sep">›</span>
      <span onclick="startCategory('${state.category}')">${cat.name}</span>
      <span class="sep">›</span>
      <span onclick="restartTree()">${tree.title}</span>
      <span class="sep">›</span>
      <span class="current">Resolution</span>
    </div>`;

  const pathHtml = state.pathHistory.length > 0 ? `
    <div class="path-history">
      <div class="path-history-title">Diagnostic path taken</div>
      <div class="path-steps">
        ${state.pathHistory.map(p => `
          <span class="path-tag">${p.q}</span>
          <span class="path-tag answer">→ ${p.a}</span>
        `).join('')}
      </div>
    </div>` : '';

  return `
    ${bcHtml}
    ${pathHtml}
    <div class="resolution-card">
      <div class="resolution-header">
        <div class="res-icon ${res.type}">${res.icon}</div>
        <div>
          <div style="font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;">Resolution Found</div>
          <div class="resolution-title">${res.title}</div>
        </div>
      </div>
      <div class="resolution-body">${res.summary}</div>
      <div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;">Steps to Resolve</div>
      <ul class="steps-list">
        ${res.steps.map((s, i) => `
          <li>
            <span class="step-num">${i+1}</span>
            <span>${s}</span>
          </li>`).join('')}
      </ul>
      ${res.commands ? `
        <div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">Useful Commands</div>
        <div class="command-box">${res.commands}</div>` : ''}
      <div class="res-actions">
        <button class="btn-primary" onclick="restartTree()">↺ Try Again</button>
        ${cat.trees.length > 1 && state.treeIndex + 1 < cat.trees.length
          ? `<button class="btn-outline" onclick="nextTree()">Next Scenario →</button>` : ''}
        <button class="btn-outline" onclick="startCategory('${state.category}')">All ${cat.name} Scenarios</button>
        <button class="btn-ghost" onclick="goHome()">Home</button>
      </div>
    </div>`;
}

// ===================== CATEGORY SCREEN =====================
function startCategory(catKey) {
  const cat = categories[catKey];
  state.category = catKey;
  state.screen = 'tree-select';

  const main = document.getElementById('mainContent');
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === catKey);
  });

  if (cat.trees.length === 1) {
    startTree(catKey, 0);
    return;
  }

  main.innerHTML = `
    <div class="home-screen">
      <div class="breadcrumb">
        <span onclick="goHome()">Home</span>
        <span class="sep">›</span>
        <span class="current">${cat.name}</span>
      </div>
      <div class="home-intro" style="margin-bottom:20px;">
        <div style="font-size:22px;margin-bottom:6px;">${cat.icon} ${cat.name}</div>
        <div style="font-size:13.5px;color:var(--text-muted);">Select a scenario to troubleshoot</div>
      </div>
      <div class="cats-grid">
        ${cat.trees.map((tree, i) => `
          <div class="cat-card" style="--card-accent:${cat.color}" onclick="startTree('${catKey}', ${i})">
            <div class="cat-card-icon">📋</div>
            <div class="cat-card-name">${tree.title}</div>
            <div class="cat-card-count">${tree.hint}</div>
            <div class="cat-card-bar" style="background:${cat.color}"></div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function startTree(catKey, treeIdx) {
  const cat = categories[catKey];
  const tree = cat.trees[treeIdx];
  state.category = catKey;
  state.treeIndex = treeIdx;
  state.screen = 'tree';
  state.pathHistory = [];
  state.currentNode = { question: tree.question, hint: tree.hint, options: tree.options };
  updateSessionStat(`${cat.icon} ${tree.title}`);
  render();
}

function selectOption(i) {
  const node = state.currentNode;
  const opt = node.options[i];
  
  state.pathHistory.push({ q: shortenQ(node.question), a: opt.label });

  if (opt.resolve) {
    state.currentResolution = opt.resolve;
    state.screen = 'resolve';
    render();
  } else if (opt.next) {
    state.currentNode = opt.next;
    render();
  }
}

function restartTree() {
  startTree(state.category, state.treeIndex);
}

function nextTree() {
  startTree(state.category, state.treeIndex + 1);
}

function goHome() {
  state.screen = 'home';
  state.category = null;
  state.pathHistory = [];
  render();
}

function shortenQ(q) {
  return q.length > 40 ? q.substring(0, 38) + '…' : q;
}

function updateSessionStat(text) {
  document.getElementById('session-stat').textContent = text;
}

// ===================== INIT =====================
document.getElementById('homeBtn').addEventListener('click', goHome);
document.getElementById('resetBtn').addEventListener('click', () => {
  if (state.category) restartTree(); else goHome();
});

render();
</script>

<script>
(function(){
  const t = localStorage.getItem('hub-theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('themeToggle');
  if(btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
})();
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('hub-theme', next);
  const btn = document.getElementById('themeToggle');
  if(btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
}
</script>

</body>
</html>
